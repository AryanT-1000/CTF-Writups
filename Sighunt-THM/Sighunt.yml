title: mshta execution SUS
id: # Put id form any online uuid generator 
status: Experimental
description: Execution of malicious HTA payload from a phishing link.
author: PhantomHertz
date: #When was the rule written.
modified: #When was it updated
logsource:
  product: windows
  service: sysmon
detection:
  selection:
    EventID: '1'  
    ParentImage|endswith: "chrome.exe"
    Image|endswith: "mshta.exe"
  condition: selection #Action to be taken. Can use condition operators such as OR, AND, NOT, 
fields: #List of associated fields that are important for the detection
  - Image
  - ParentImage
  - CommandLine
  - User
  - ComputerName

falsepositives: #Any possible false positives that could trigger the rule.
  - Legitimate enterprise HTA applications
  - Administrative scripts using mshta.exe
  - Software installers launching HTA files

level: medium #Severity level of the detection rule.
tags: #Associated TTPs from MITRE ATT&CK
  - attack.defense_evasion #MITRE Tactic should be Stealth  => attack.stealth.System_Binary_Proxy_Execution.Mshta
  - attack.t1218.005 #MITRE Technique
  
