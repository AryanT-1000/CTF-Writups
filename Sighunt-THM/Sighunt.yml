title: CertUtils LOLBINS
id: # Put id form any online generator uuid
status: Experimental
description: Execution of Certutil tool to download Netcat binary.
author: PhantomHertz
date: #When was the rule written.
modified: #When was it updated
logsource:
  product: windows
  service: sysmon
detection:
  selection:
    EventID: '1'   
    Image|endswith: "\\certutil.exe"
    CommandLine|contains: 
     - ' -urlcache '
     - ' -split '
     - ' -f '
  condition: selection #Action to be taken. Can use condition operators such as OR, AND, NOT, 
fields:  #List of associated fields that are important for the detection
  - Image
  - CommandLine
  - ParentImage
  - User
  - ComputerName

falsepositives: 
  - Administrative certificate management operations 
  - Legitimate file retrieval using certutil
  - Enterprise automation or deployment scripts 

level: medium #Severity level of the detection rule.
tags: #Associated TTPs from MITRE ATT&CK
  - attack.command_and_control #MITRE Tactic
  - attack.defense_evasion #MITRE Tactic
  - attack.t1105 #MITRE Technique

