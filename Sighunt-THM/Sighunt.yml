  - Authorized penetration testing activity
  - Internal red team operations
  - Security research or lab environments

level: high #Severity level of the detection rule.
tags: #Associated TTPs from MITRE ATT&CK
  - attack.command_and_control #MITRE Tactic
  - attack.execution #MITRE Tactic
